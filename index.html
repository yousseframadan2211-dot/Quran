<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرآن الكريم</title>

<style>
:root { --primary:#064e3b; --gold:#b45309; }

body { margin:0; font-family:Tahoma; background:#f3f4f6; }

header {
    background:var(--primary);
    color:#fff;
    text-align:center;
    padding:40px;
}

#viewer {
    text-align:center;
    margin:20px;
}

#viewer img {
    width:90%;
    max-width:600px;
    border-radius:10px;
    transition:0.3s;
}

.controls {
    text-align:center;
    margin:10px;
}

button {
    padding:10px;
    margin:5px;
    border:none;
    background:var(--primary);
    color:#fff;
    border-radius:8px;
    cursor:pointer;
}

#ayahBox {
    padding:15px;
    line-height:2;
    font-size:20px;
}

.ayah {
    padding:10px;
    margin-bottom:5px;
    border-bottom:1px solid #ddd;
}

.active {
    background:#fde68a;
}

.dark {
    background:#111;
    color:#fff;
}

.footer-black {
    background:#000;
    color:#fff;
    text-align:center;
    padding:40px;
}
</style>
</head>

<body>

<header>
<h1>القرآن الكريم</h1>
</header>

<div class="controls">
<button onclick="prevPage()">⬅️</button>
<span id="pageNum">1</span>
<button onclick="nextPage()">➡️</button>

<button onclick="toggleDark()">🌙</button>

<select onchange="goToJuz(this.value)">
<option>جزء</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
</select>
</div>

<div id="viewer">
<img id="pageImg">
</div>

<div id="ayahBox"></div>

<audio id="audio" controls style="width:100%"></audio>

<div class="footer-black">
<h3>برمجة وتطوير المهندس يوسف رمضان</h3>
<p>للتواصل لعمل وتطوير المواقع والتطبيقات</p>
<p>نعمل على تقديم أفضل الخدمات التقنية في مصر والوطن العربي</p>
<a href="https://wa.me/201092377837"
style="color:#fff;background:#25d366;padding:10px 20px;border-radius:10px;text-decoration:none;">
تواصل معي عبر واتساب 💬
</a>
</div>

<script>

let page = 1;
let ayat = [];
let currentIndex = 0;

/* 📖 تحميل صفحة */
function loadPage(){
    pageImg.src = `https://cdn.islamic.network/quran/images/${page}.png`;
    pageNum.innerText = page;

    localStorage.setItem("page", page);

    loadAyatByPage(page);
}

/* ➡️⬅️ */
function nextPage(){ if(page<604){page++; loadPage();} }
function prevPage(){ if(page>1){page--; loadPage();} }

/* 📖 ربط الصفحة بالآيات */
async function loadAyatByPage(p){
    let res = await fetch(`https://api.alquran.cloud/v1/page/${p}`);
    let data = await res.json();

    ayat = data.data.ayahs;

    ayahBox.innerHTML = ayat.map((a,i)=>`
        <div class="ayah" id="a-${i}">
            ${a.text}
            <br>
            <button onclick="playAyah(${i})">▶️</button>
            <button onclick="bookmark(${p},${i})">📌</button>
        </div>
    `).join('');
}

/* 🔊 تشغيل */
function playAyah(i){
    currentIndex = i;

    let a = ayat[i];
    let s = a.surah.number;
    let n = a.numberInSurah;

    audio.src = `https://cdn.islamic.network/quran/audio/128/ar.alafasy/${s}${n}.mp3`;
    audio.play();

    highlight(i);
}

/* ✨ هايلايت */
function highlight(i){
    document.querySelectorAll('.ayah').forEach(e=>e.classList.remove("active"));
    document.getElementById("a-"+i).classList.add("active");
}

/* 🔁 */
audio.onended = ()=>{
    if(currentIndex < ayat.length-1){
        playAyah(currentIndex+1);
    }
};

/* 📌 */
function bookmark(p,i){
    localStorage.setItem("bookmark", JSON.stringify({p,i}));
    alert("تم الحفظ");
}

/* 📌 تحميل */
function loadBookmark(){
    let b = JSON.parse(localStorage.getItem("bookmark"));
    if(!b) return;

    page = b.p;
    loadPage();

    setTimeout(()=>{
        highlight(b.i);
    },500);
}

/* 📱 Swipe */
let startX=0;
pageImg.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
pageImg.addEventListener("touchend",e=>{
    let endX=e.changedTouches[0].clientX;
    if(endX<startX-50) nextPage();
    else if(endX>startX+50) prevPage();
});

/* 🌙 */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* 📖 جزء */
async function goToJuz(j){
    let res = await fetch(`https://api.alquran.cloud/v1/juz/${j}`);
    let data = await res.json();

    ayat = data.data.ayahs;
    ayahBox.innerHTML = ayat.map(a=>a.text).join("<br>");
}

/* 🚀 */
window.onload = ()=>{
    let saved = localStorage.getItem("page");
    if(saved) page = parseInt(saved);

    loadPage();
    loadBookmark();
};

</script>

</body>
</html>
