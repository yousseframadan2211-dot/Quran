<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف المهندس يوسف رمضان</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #064e3b; --gold: #b45309; --light-gold: #fde68a; --white: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; margin: 0; padding-bottom: 0; color: #1f2937; }
        header { background: linear-gradient(rgba(6,78,59,0.95), rgba(6,78,59,0.95)), url('https://transparenttextures.com'); color: var(--light-gold); padding: 80px 20px; text-align: center; border-bottom: 5px solid var(--gold);}
        header h1 { font-size: clamp(45px, 10vw, 75px); margin: 0;}
        .search-area { margin: -35px auto 40px; text-align: center;}
        #searchInput { width: 85%; max-width: 700px; padding: 22px; border-radius: 50px; border: 3px solid var(--gold); font-size: 20px; text-align:center;}
        .container { max-width: 1200px; margin:auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:25px; padding:20px;}
        .card { background:#fff; padding:30px; border-radius:25px; text-align:center; cursor:pointer;}
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85);}
        .modal-content { background:#fff; max-width:800px; margin:2vh auto; border-radius:30px; height:90vh; display:flex; flex-direction:column;}
        .modal-body { flex:1; overflow:auto; padding:20px;}
        .surah-item { display:flex; justify-content:space-between; padding:10px; margin-bottom:10px; background:#f9fafb;}
        .player-fixed { position:fixed; bottom:0; width:100%; background:#fff; padding:20px; text-align:center; display:none;}
        .footer-black { background:#000; color:#fff; padding:60px 20px; text-align:center;}
    </style>
</head>
<body>

<header>
    <h1>القرآن الكريم</h1>
    <p>بإشراف المهندس يوسف رمضان</p>
</header>

<div class="search-area">
    <input type="text" id="searchInput" placeholder="ابحث عن القراء" onkeyup="search()">
</div>

<div class="container" id="grid"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div style="padding:20px; background:#064e3b; color:#fff;">
            <h2 id="mName"></h2>
        </div>
        <div class="modal-body">
            <button id="zip">تحميل المصحف كامل</button>
            <div id="list"></div>
        </div>
    </div>
</div>

<div class="player-fixed" id="player">
    <div id="pTitle"></div>
    <audio id="audio" controls autoplay style="width:100%; max-width:700px;"></audio>

    <!-- الإضافات -->
    <div style="margin-top:10px;">
        <button onclick="audio.play()">▶️</button>
        <button onclick="audio.pause()">⏸</button>

        <select onchange="changeSpeed(this.value)">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
        </select>
    </div>
</div>

<div class="footer-black">
    <h3>برمجة يوسف رمضان</h3>
</div>

<script>
let data = [];
let currentList = [];
let currentIndex = 0;

const names = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

async function load(){
    const r = await fetch('https://mp3quran.net/api/v3/reciters?language=ar');
    const d = await r.json();
    data = d.reciters;
    show(data);
}

function show(l){
    grid.innerHTML = l.map(r=>`
        <div class="card" onclick="openS('${r.id}')">
            <h3>${r.name}</h3>
        </div>
    `).join('');
}

function search(){
    const t = searchInput.value.toLowerCase();
    show(data.filter(r=>r.name.toLowerCase().includes(t)));
}

function openS(id){
    const r = data.find(i=>i.id==id);
    const m = r.moshaf[0];

    mName.innerText = r.name;

    currentList = m.surah_list.split(',');

    zip.onclick = ()=>{
        currentList.forEach((n,i)=>{
            setTimeout(()=>{
                let a=document.createElement('a');
                a.href=`${m.server}${n.padStart(3,'0')}.mp3`;
                a.download='';
                a.click();
            },i*800);
        });
    };

    list.innerHTML = currentList.map((n,i)=>{
        const url=`${m.server}${n.padStart(3,'0')}.mp3`;
        return `
        <div class="surah-item">
            <span>${names[n-1]}</span>
            <div>
                <button onclick="playIndex(${i},'${r.name}')">▶️</button>
                <a href="${url}" download>📥</a>
            </div>
        </div>`;
    }).join('');

    modal.style.display='block';
}

function playIndex(i,name){
    currentIndex=i;
    let n=currentList[i];
    let url=`https://server8.mp3quran.net/${n.padStart(3,'0')}.mp3`;

    audio.src=url;
    audio.play();
    player.style.display='block';
    pTitle.innerText=name+" - "+names[n-1];

    localStorage.setItem("last",JSON.stringify({i,name}));
}

audio.onended=()=>{
    if(currentIndex<currentList.length-1){
        playIndex(currentIndex+1,"");
    }
};

function changeSpeed(s){
    audio.playbackRate=s;
}

window.onload=()=>{
    load();
    let last=localStorage.getItem("last");
    if(last){
        let d=JSON.parse(last);
        setTimeout(()=>playIndex(d.i,d.name),1500);
    }
};
</script>

</body>
</html>
