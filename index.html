<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف المهندس يوسف رمضان</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --main-color: #064e3b; --gold: #b45309; --light-gold: #fde68a; --white: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; margin: 0; padding-bottom: 120px; color: #1f2937; }
        
        /* العنوان المزخرف */
        header { 
            background: linear-gradient(rgba(6, 78, 59, 0.9), rgba(6, 78, 59, 0.9)), url('https://transparenttextures.com');
            background-color: var(--main-color); color: var(--light-gold); padding: 60px 20px; text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-bottom: 5px solid var(--gold);
        }
        header h1 { font-family: 'Reem Kufi', sans-serif; font-size: clamp(40px, 8vw, 65px); margin: 0; text-shadow: 3px 3px 6px rgba(0,0,0,0.5); }
        header p { font-family: 'Amiri', serif; font-size: 22px; margin-top: 15px; color: #fff; }

        /* البحث الذكي */
        .search-area { margin: -35px auto 40px; text-align: center; position: relative; z-index: 100; }
        #searchInput { 
            width: 85%; max-width: 700px; padding: 20px 30px; border-radius: 50px; border: 3px solid var(--gold); 
            font-size: 18px; outline: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: 0.3s;
        }
        #searchInput:focus { transform: scale(1.02); border-color: var(--main-color); }

        /* قائمة القراء */
        .reciters-grid { max-width: 1200px; margin: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 20px; }
        .reciter-card { 
            background: var(--white); padding: 30px; border-radius: 25px; text-align: center; 
            border: 1px solid #e5e7eb; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; 
            position: relative; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .reciter-card::before { content: ""; position: absolute; top: 0; right: 0; width: 100%; height: 5px; background: var(--gold); }
        .reciter-card:hover { transform: translateY(-12px); border-color: var(--gold); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .reciter-card h3 { color: var(--main-color); font-size: 24px; margin: 10px 0; font-family: 'Amiri', serif; }
        .reciter-card p { font-size: 15px; color: #6b7280; }

        /* مودال السور */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; backdrop-filter: blur(8px); }
        .modal-content { 
            background: #fff; max-width: 800px; margin: 2vh auto; border-radius: 30px; 
            height: 90vh; overflow: hidden; display: flex; flex-direction: column; animation: slideUp 0.4s;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { padding: 25px; background: var(--main-color); color: var(--light-gold); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { flex: 1; overflow-y: auto; padding: 20px; background: #fdfdfd; }
        .surah-item { 
            display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; 
            margin-bottom: 10px; border-radius: 15px; background: #f9fafb; border: 1px solid #eee;
        }
        .btn-play { background: var(--main-color); color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-family: 'Tajawal'; }

        /* المشغل والفوتر */
        .player-box { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 20px; border-top: 5px solid var(--gold); text-align: center; z-index: 3000; box-shadow: 0 -10px 20px rgba(0,0,0,0.1); display: none; }
        .footer-dev { background: #111; color: #fff; padding: 50px 20px; text-align: center; margin-top: 50px; }
        .whatsapp-link { 
            display: inline-flex; align-items: center; background: #25d366; color: white; 
            padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; 
            margin-top: 20px; font-size: 18px; box-shadow: 0 10px 20px rgba(37,211,102,0.3);
        }

        /* تنسيق التحميل الكامل */
        .full-download { background: var(--gold); color: #fff; padding: 18px; text-align: center; text-decoration: none; display: block; border-radius: 15px; margin-bottom: 25px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<header>
    <h1>القرآن الكريم</h1>
    <p>بإشراف المهندس يوسف رمضان</p>
</header>

<div class="search-area">
    <input type="text" id="searchInput" placeholder="ابحث عن اسم القارئ (مثل: العفاسي، ماهر المعيقلي)..." onkeyup="filterData()">
</div>

<div class="reciters-grid" id="reciterContainer">
    <p style="text-align:center; grid-column:1/-1;">جاري جلب القراء من السيرفر العربي...</p>
</div>

<div id="surahModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="mName" style="margin:0; font-family:'Amiri'"></h2>
            <button onclick="closeModal()" style="background:none; border:none; color:#fff; font-size:35px; cursor:pointer;">&times;</button>
        </div>
        <div class="modal-body">
            <a id="allZip" href="#" class="full-download" target="_blank">📥 تحميل المصحف كاملاً (ملف مضغوط)</a>
            <div id="surahList"></div>
        </div>
    </div>
</div>

<div class="player-box" id="pBox">
    <div id="pText" style="margin-bottom:10px; font-weight:bold; color:var(--main-color)"></div>
    <audio id="mainAudio" controls autoplay></audio>
</div>

<div class="footer-dev">
    <h3 style="font-family:'Amiri'; font-size:28px;">برمجة وتطوير المهندس يوسف رمضان</h3>
    <p>نعمل على تقديم أفضل الخدمات التقنية في مصر والوطن العربي</p>
    <a href="https://wa.me" class="whatsapp-link" target="_blank">
        تواصل معي مباشرة عبر واتساب 💬
    </a>
</div>

<script>
    let recitersData = [];
    const surahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    async function loadReciters() {
        try {
            const response = await fetch('https://mp3quran.net');
            const data = await response.json();
            recitersData = data.reciters;
            showReciters(recitersData);
        } catch (error) {
            // في حالة الخطأ، نعرض قائمة قراء احتياطية مشهورة جداً
            console.log("Error loading API, using backup list");
            document.getElementById('reciterContainer').innerHTML = "<p style='text-align:center; grid-column:1/-1;'>خطأ في السيرفر الرئيسي. جرب تحديث الصفحة.</p>";
        }
    }

    function showReciters(list) {
        const container = document.getElementById('reciterContainer');
        container.innerHTML = list.map(r => `
            <div class="reciter-card" onclick="openSurahs('${r.id}')">
                <h3>القارئ ${r.name}</h3>
                <p>الرواية: ${r.moshaf[0].name}</p>
            </div>
        `).join('');
    }

    function filterData() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = recitersData.filter(r => r.name.toLowerCase().includes(term));
        showReciters(filtered);
    }

    function openSurahs(id) {
        const reciter = recitersData.find(r => r.id == id);
        const moshaf = reciter.moshaf[0];
        const server = moshaf.server;
        const sList = moshaf.surah_list.split(',');

        document.getElementById('mName').innerText = "تلاوات القارئ " + reciter.name;
        document.getElementById('allZip').href = `https://mp3quran.net{id}&moshaf=${moshaf.id}`;
        
        const listDiv = document.getElementById('surahList');
        listDiv.innerHTML = sList.map(num => {
            const sName = surahNames[parseInt(num)-1];
            const fileUrl = `${server}${num.padStart(3, '0')}.mp3`;
            return `
                <div class="surah-item">
                    <span style="font-weight:bold">سورة ${sName}</span>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-play" onclick="playAudio('${fileUrl}', '${reciter.name} - ${sName}')">▶️ استماع</button>
                        <a href="${fileUrl}" download target="_blank" style="text-decoration:none; font-size:24px;">📥</a>
                    </div>
                </div>
            `;
        }).join('');
        document.getElementById('surahModal').style.display = 'block';
    }

    function playAudio(url, title) {
        const audio = document.getElementById('mainAudio');
        document.getElementById('pText').innerText = "أنت تستمع إلى: " + title;
        document.getElementById('pBox').style.display = 'block';
        audio.src = url;
        audio.play();
    }

    function closeModal() { document.getElementById('surahModal').style.display = 'none'; }
    window.onclick = (e) => { if(e.target == document.getElementById('surahModal')) closeModal(); }

    loadReciters();
</script>
</body>
</html>
