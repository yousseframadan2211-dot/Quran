<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف المهندس يوسف رمضان</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #064e3b; --gold: #b45309; --light-gold: #fde68a; --white: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; margin: 0; padding-bottom: 0; color: #1f2937; }
        
        header { 
            background: linear-gradient(rgba(6, 78, 59, 0.95), rgba(6, 78, 59, 0.95)), url('https://transparenttextures.com');
            background-color: var(--primary); color: var(--light-gold); padding: 70px 20px; text-align: center; 
            border-bottom: 5px solid var(--gold);
        }
        header h1 { font-family: 'Reem Kufi', sans-serif; font-size: clamp(45px, 10vw, 75px); margin: 0; text-shadow: 3px 3px 6px rgba(0,0,0,0.5); }
        header p { font-family: 'Amiri', serif; font-size: 24px; margin-top: 15px; color: #fff; }

        .search-area { margin: -35px auto 40px; text-align: center; position: relative; z-index: 100; }
        #searchInput { 
            width: 85%; max-width: 700px; padding: 22px 35px; border-radius: 50px; border: 3px solid var(--gold); 
            font-size: 20px; outline: none; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: 0.3s; text-align: center;
        }

        .container { max-width: 1200px; margin: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 20px; min-height: 400px; }
        .card { 
            background: var(--white); padding: 30px; border-radius: 25px; text-align: center; 
            border: 1px solid #e5e7eb; transition: 0.4s; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .card h3 { color: var(--primary); font-size: 24px; margin: 10px 0; font-family: 'Amiri', serif; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; backdrop-filter: blur(8px); }
        .modal-content { background: #fff; max-width: 800px; margin: 2vh auto; border-radius: 30px; height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { padding: 25px; background: var(--primary); color: var(--light-gold); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
        
        .surah-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; margin-bottom: 10px; border-radius: 15px; background: #f9fafb; border: 1px solid #eee; }
        .btn-play { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; }

        .player-fixed { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 20px; border-top: 4px solid var(--gold); text-align: center; z-index: 3000; display: none; }
        
        /* الفوتر الأسود الاحترافي */
        .footer-black { background: #000; color: #fff; padding: 60px 20px; text-align: center; margin-top: 50px; }
        .footer-black h3 { font-family: 'Amiri', serif; font-size: 32px; margin-bottom: 10px; color: var(--light-gold); }
        .footer-black p { opacity: 0.8; margin-bottom: 30px; font-size: 18px; }
        .wa-btn { 
            display: inline-flex; align-items: center; background: #25d366; color: white; 
            padding: 18px 45px; border-radius: 50px; text-decoration: none; font-weight: bold; 
            font-size: 20px; box-shadow: 0 10px 20px rgba(37,211,102,0.4); transition: 0.3s;
        }
        .wa-btn:hover { transform: scale(1.1); background: #128c7e; }
    </style>
</head>
<body>

<header>
    <h1>القرآن الكريم</h1>
    <p>استماع وتحميل المصحف الشامل</p>
</header>

<div class="search-area">
    <input type="text" id="searchInput" placeholder="ابحث عن القراء" onkeyup="search()">
</div>

<div class="container" id="grid">
    <p style="text-align:center; grid-column:1/-1;">جاري تحميل القراء...</p>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="mName" style="margin:0; font-family:'Amiri'"></h2>
            <button onclick="closeModal()" style="background:none; border:none; color:#fff; font-size:40px; cursor:pointer;">&times;</button>
        </div>
        <div class="modal-body">
            <a id="zip" href="#" style="background:var(--gold); color:#fff; padding:15px; text-align:center; display:block; border-radius:15px; text-decoration:none; font-weight:bold; margin-bottom:20px;">📥 تحميل المصحف كاملاً (ZIP)</a>
            <div id="list"></div>
        </div>
    </div>
</div>

<div class="player-fixed" id="player">
    <div id="pTitle" style="margin-bottom:10px; font-weight:bold; color:var(--primary)"></div>
    <audio id="audio" controls autoplay style="width: 100%; max-width: 700px;"></audio>
</div>

<div class="footer-black">
    <h3>برمجة وتطوير المهندس يوسف رمضان</h3>
    <p>نعمل على تقديم أفضل الخدمات التقنية في مصر والوطن العربي</p>
    <a href="https://wa.me" class="wa-btn" target="_blank">
        تواصل معي مباشرة عبر واتساب 💬
    </a>
</div>

<script>
    let data = [];
    const names = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    async function load() {
        try {
            const r = await fetch('https://mp3quran.net');
            const d = await r.json();
            data = d.reciters;
            show(data);
        } catch (e) {
            document.getElementById('grid').innerHTML = "<p style='text-align:center; grid-column:1/-1;'>خطأ في السيرفر الرئيسي. جرب تحديث الصفحة.</p>";
        }
    }

    function show(l) {
        document.getElementById('grid').innerHTML = l.map(r => `
            <div class="card" onclick="openS('${r.id}')">
                <h3>القارئ ${r.name}</h3>
                <p>${r.moshaf[0].name}</p>
            </div>
        `).join('');
    }

    function search() {
        const t = document.getElementById('searchInput').value.toLowerCase();
        show(data.filter(r => r.name.toLowerCase().includes(t)));
    }

    function openS(id) {
        const r = data.find(i => i.id == id);
        const m = r.moshaf[0];
        document.getElementById('mName').innerText = "تلاوات " + r.name;
        document.getElementById('zip').href = `https://mp3quran.net{id}&moshaf=${m.id}`;
        document.getElementById('list').innerHTML = m.surah_list.split(',').map(n => {
            const url = `${m.server}${n.padStart(3, '0')}.mp3`;
            return `
                <div class="surah-item">
                    <span>سورة ${names[parseInt(n)-1]}</span>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-play" onclick="play('${url}', '${r.name} - ${names[parseInt(n)-1]}')">▶️</button>
                        <a href="${url}" download target="_blank" style="text-decoration:none; font-size:20px;">📥</a>
                    </div>
                </div>
            `;
        }).join('');
        document.getElementById('modal').style.display = 'block';
    }

    function play(u, t) {
        const a = document.getElementById('audio');
        document.getElementById('pTitle').innerText = "جاري تشغيل: " + t;
        document.getElementById('player').style.display = 'block';
        a.src = u;
        a.play();
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    load();
</script>
</body>
</html>
