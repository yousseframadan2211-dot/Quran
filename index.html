<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف يوسف الإلكتروني</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #1b4332; --secondary: #2d6a4f; --gold: #b7903c; --light: #f8f9fa; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f0; margin: 0; padding-bottom: 120px; color: #333; }
        
        header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 50px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        header h1 { font-family: 'Amiri', serif; font-size: 55px; margin: 0; color: var(--gold); text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        header p { font-size: 18px; opacity: 0.9; margin-top: 10px; }

        .search-section { margin: -30px auto 30px; text-align: center; position: relative; z-index: 10; }
        input { width: 85%; max-width: 600px; padding: 18px 25px; border-radius: 50px; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.1); font-size: 18px; outline: none; font-family: 'Tajawal'; }

        .container { max-width: 1200px; margin: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; text-align: center; transition: 0.3s; border: 1px solid #e0e0e0; cursor: pointer; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0,0,0,0.1); border-color: var(--gold); }
        .card h3 { margin: 10px 0; color: var(--primary); font-size: 20px; }
        .card p { font-size: 14px; color: #666; margin-bottom: 0; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; backdrop-filter: blur(5px); }
        .modal-content { background: white; max-width: 700px; margin: 30px auto; border-radius: 25px; height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { padding: 20px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
        
        .download-full { background: var(--gold); color: white; padding: 15px; text-align: center; text-decoration: none; display: block; font-weight: bold; border-radius: 10px; margin-bottom: 20px; transition: 0.3s; }
        .download-full:hover { opacity: 0.9; }

        .surah-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #eee; transition: 0.2s; }
        .surah-row:hover { background: #f9f9f9; }
        .action-btns button, .action-btns a { background: none; border: none; cursor: pointer; font-size: 20px; text-decoration: none; margin-left: 10px; }

        .player-bar { position: fixed; bottom: 0; width: 100%; background: white; border-top: 4px solid var(--gold); padding: 15px; text-align: center; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 3000; display: none; }
        audio { width: 90%; max-width: 800px; height: 45px; }

        .contact-footer { text-align: center; padding: 40px 0; background: #eee; }
        .wa-footer-btn { background: #25d366; color: white; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(37,211,102,0.3); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <h1>قرآن كريم</h1>
    <p>موسوعة التلاوات الشاملة - استماع وتحميل مباشر</p>
</header>

<div class="search-section">
    <input type="text" id="searchInput" placeholder="ابحث عن قارئك المفضل..." onkeyup="filterReciters()">
</div>

<div class="container" id="recitersList">
    <p style="text-align: center; grid-column: 1/-1;">جاري تحميل مكتبة القراء...</p>
</div>

<div id="surahModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle" style="margin:0"></h2>
            <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:30px; cursor:pointer;">&times;</button>
        </div>
        <div class="modal-body" id="modalBody">
            <a id="fullDownloadBtn" href="#" class="download-full" target="_blank">📥 تحميل المصحف كامل (ZIP)</a>
            <div id="surahList"></div>
        </div>
    </div>
</div>

<div class="player-bar" id="playerBar">
    <div id="trackInfo" style="font-weight: bold; margin-bottom: 8px; color: var(--primary);"></div>
    <audio id="audioPlayer" controls autoplay></audio>
</div>

<div class="contact-footer">
    <a href="https://wa.me" class="wa-footer-btn" target="_blank">
        <span>تواصل معي عبر واتساب</span>
    </a>
</div>

<script>
    let allReciters = [];
    const surahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    async function init() {
        try {
            const res = await fetch('https://mp3quran.net');
            const data = await res.json();
            allReciters = data.reciters;
            renderReciters(allReciters);
        } catch (e) {
            document.getElementById('recitersList').innerHTML = "حدث خطأ في تحميل البيانات. يرجى المحاولة لاحقاً.";
        }
    }

    function renderReciters(list) {
        const container = document.getElementById('recitersList');
        container.innerHTML = list.map(r => `
            <div class="card" onclick="openSurahs('${r.id}')">
                <h3>${r.name}</h3>
                <p>${r.moshaf[0].name}</p>
            </div>
        `).join('');
    }

    function filterReciters() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allReciters.filter(r => r.name.toLowerCase().includes(query));
        renderReciters(filtered);
    }

    function openSurahs(reciterId) {
        const reciter = allReciters.find(r => r.id == reciterId);
        const moshaf = reciter.moshaf[0];
        const server = moshaf.server;
        const list = moshaf.surah_list.split(',');

        document.getElementById('modalTitle').innerText = reciter.name;
        document.getElementById('fullDownloadBtn').href = `https://mp3quran.net{reciterId}&moshaf=${moshaf.id}`;
        
        const surahContainer = document.getElementById('surahList');
        surahContainer.innerHTML = list.map(sNum => {
            const name = surahNames[parseInt(sNum) - 1];
            const paddedNum = sNum.padStart(3, '0');
            const url = `${server}${paddedNum}.mp3`;
            return `
                <div class="surah-row">
                    <span>سورة ${name}</span>
                    <div class="action-btns">
                        <button onclick="playAudio('${url}', '${reciter.name} - ${name}')">▶️</button>
                        <a href="${url}" download target="_blank">📥</a>
                    </div>
                </div>
            `;
        }).join('');

        document.getElementById('surahModal').style.display = 'block';
    }

    function playAudio(url, title) {
        const player = document.getElementById('audioPlayer');
        document.getElementById('trackInfo').innerText = "جاري تشغيل: " + title;
        document.getElementById('playerBar').style.display = 'block';
        player.src = url;
        player.play();
    }

    function closeModal() { document.getElementById('surahModal').style.display = 'none'; }
    window.onclick = (e) => { if(e.target.className == 'modal') closeModal(); }

    init();
</script>
</body>
</html>
